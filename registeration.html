<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Register | Beetroot Detox</title>
  <!-- Google Fonts + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --accent: #BC2F4C;
      --accent-secondary: #E2A76F;
      --accent-glow: rgba(188, 47, 76, 0.35);
      --bg-primary: #0A0C0F;
      --bg-secondary: #0F1217;
      --card-bg: #1A1E26;
      --text-primary: #F7F5F0;
      --text-muted: #CFD3DC;
      --border-light: rgba(255,255,255,0.06);
      --shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
      --footer-bg: #0C0F14;
    }

    body.light {
      --bg-primary: #FEF8F5;
      --bg-secondary: #FFFFFF;
      --card-bg: #FFFFFF;
      --text-primary: #1A2A2F;
      --text-muted: #1F3A42;
      --border-light: rgba(0,0,0,0.08);
      --shadow: 0 15px 30px -12px rgba(0, 0, 0, 0.1);
      --accent: #A52A44;
      --accent-secondary: #D6894A;
      --accent-glow: rgba(165, 42, 68, 0.2);
      --footer-bg: #F4EFEA;
    }

    body.dark {
      --bg-primary: #0A0C0F;
      --bg-secondary: #0F1217;
      --card-bg: #191E27;
      --text-primary: #F9F5EF;
      --text-muted: #C2C9D2;
      --border-light: rgba(255,255,255,0.05);
      --accent: #D1495B;
      --accent-secondary: #E6B17E;
      --accent-glow: rgba(209, 73, 91, 0.3);
      --footer-bg: #0C0F14;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: all 0.3s ease;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-top: 68px;
    }

    /* ========= STABLE NAVBAR ========= */
    nav {
      background-color: var(--card-bg);
      border-bottom: 2px solid color-mix(in srgb, var(--accent) 35%, transparent);
      backdrop-filter: blur(14px);
      position: fixed;
      top: 0;
      z-index: 1000;
      width: 100%;
    }
    body.light nav { background: rgba(255, 252, 248, 0.96); border-bottom-color: rgba(165, 42, 68, 0.3); }
    body.dark nav { background: rgba(16, 19, 26, 0.97); }

    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0.75rem 2rem;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      text-decoration: none;
      transition: transform 0.3s ease;
    }
    .logo:hover {
      transform: scale(1.05);
    }
    .logo-text {
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      background-clip: text !important;
      -webkit-background-clip: text !important;
      color: transparent !important;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: -0.3px;
    }
    .logo-icon-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      border-radius: 12px;
      flex-shrink: 0;
    }
    .logo-icon-wrapper i {
      background: none;
      color: var(--accent);
      font-size: 1.4rem;
    }
    .logo-icon-wrapper .fa-droplet, .logo-icon-wrapper .fa-tint {
      position: absolute;
      font-size: 1.6rem;
      opacity: 0.8;
    }
    .logo-icon-wrapper .fa-leaf {
      position: relative;
      font-size: 0.9rem;
      color: var(--accent-secondary);
      z-index: 2;
      margin-top: 4px;
    }

    .auth-card .logo {
      margin-bottom: 2rem;
    }

    /* Auth Section Styles */
    .auth-section {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      background: radial-gradient(circle at center, color-mix(in srgb, var(--accent) 5%, transparent), transparent);
    }

    .auth-card {
      background: var(--card-bg);
      border: 1px solid var(--border-light);
      border-radius: 32px;
      padding: 3rem;
      width: 100%;
      max-width: 520px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .auth-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    .auth-card p {
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
      margin-bottom: 1.2rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      font-size: 0.9rem;
      color: var(--text-primary);
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i.field-icon {
      position: absolute;
      left: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    .input-wrapper input {
      width: 100%;
      padding: 1rem 1.2rem 1rem 3.2rem;
      border-radius: 16px;
      border: 1.5px solid var(--border-light);
      background: color-mix(in srgb, var(--text-primary) 3%, transparent);
      color: var(--text-primary);
      font-size: 1rem;
      outline: none;
      transition: all 0.2s ease;
    }

    .input-wrapper input:focus {
      border-color: var(--accent);
      background: transparent;
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    .toggle-password {
      position: absolute;
      right: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--text-muted);
      transition: color 0.2s;
    }
    .toggle-password:hover { color: var(--accent); }

    .btn-auth {
      width: 100%;
      padding: 1.1rem;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 1rem;
      box-shadow: 0 10px 20px var(--accent-glow);
    }

    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px var(--accent-glow);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.8rem 0;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border-light);
    }

    .social-auth {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
    }

    .social-btn {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      border: 1.5px solid var(--border-light);
      background: transparent;
      color: var(--text-primary);
      font-size: 1.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .social-btn:hover {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 5%, transparent);
      transform: translateY(-3px);
    }

    .auth-footer {
      margin-top: 2rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .auth-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .auth-footer a:hover { text-decoration: underline; }

    /* Controls */
    .navbar-controls {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      flex-shrink: 0;
    }
    .mode-toggle, .rtl-toggle {
      background: transparent;
      border: 1.5px solid var(--accent);
      border-radius: 40px;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-primary);
      transition: all 0.2s ease;
      backdrop-filter: blur(4px);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .mode-toggle:hover, .rtl-toggle:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    
    /* RTL Specific Adjustments */
    body[dir="rtl"] .auth-card { text-align: right; }
    body[dir="rtl"] .form-group { text-align: right; }
    body[dir="rtl"] .input-wrapper i.field-icon { left: auto; right: 1.2rem; }
    body[dir="rtl"] .input-wrapper input { padding: 1rem 3.2rem 1rem 1.2rem; }
    body[dir="rtl"] .toggle-password { right: auto; left: 1.2rem; }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .auth-card { padding: 2rem 1.5rem; }
      .auth-card h2 { font-size: 2rem; }
    }
  </style>
</head>
<body class="dark" dir="ltr">
  <!-- ========= STICKY NAVBAR ========= -->
  <nav>
    <div class="nav-container">
      <div></div>
      <div class="navbar-controls">
        <button class="mode-toggle" id="darkModeToggle"><i class="fas fa-moon"></i> Dark</button>
        <button class="rtl-toggle" id="rtlToggle"><i class="fas fa-exchange-alt"></i> RTL</button>
      </div>
    </div>
  </nav>

  <section class="auth-section">
    <div class="auth-card">
      <a href="index.html" class="logo">
        <div class="logo-icon-wrapper">
          <i class="fas fa-droplet"></i>
          <i class="fas fa-leaf"></i>
        </div>
        <span class="logo-text">Beetroot Detox</span>
      </a>

      <h2>Join the Movement</h2>
      <p>Start your journey to rooted vitality today</p>

      <form id="registerForm">
        <div class="form-grid">
          <div class="form-group">
            <label>First Name</label>
            <div class="input-wrapper">
              <i class="fas fa-user field-icon"></i>
              <input type="text" placeholder="John" required>
            </div>
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <div class="input-wrapper">
              <i class="fas fa-user field-icon"></i>
              <input type="text" placeholder="Doe" required>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope field-icon"></i>
            <input type="email" placeholder="name@example.com" required>
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock field-icon"></i>
            <input type="password" id="password" placeholder="••••••••" required>
            <i class="fas fa-eye toggle-password" id="togglePassword"></i>
          </div>
        </div>

        <button type="submit" class="btn-auth">Create Account</button>
      </form>

      <div class="divider">or sign up with</div>

      <div class="social-auth">
        <button class="social-btn" title="Google"><i class="fab fa-google"></i></button>
        <button class="social-btn" title="Facebook"><i class="fab fa-facebook-f"></i></button>
        <button class="social-btn" title="Apple"><i class="fab fa-apple"></i></button>
      </div>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign In</a>
      </div>
    </div>
  </section>

  <script>
    // Theme toggle
    const body = document.body;
    const darkToggle = document.getElementById('darkModeToggle');
    
    function setTheme(theme) {
      if (theme === 'light') {
        body.classList.remove('dark');
        body.classList.add('light');
        darkToggle.innerHTML = '<i class="fas fa-sun"></i> Light';
      } else {
        body.classList.remove('light');
        body.classList.add('dark');
        darkToggle.innerHTML = '<i class="fas fa-moon"></i> Dark';
      }
    }

    darkToggle.addEventListener('click', () => {
      const isDark = body.classList.contains('dark');
      setTheme(isDark ? 'light' : 'dark');
      localStorage.setItem('beetroot-theme', isDark ? 'light' : 'dark');
    });

    const savedTheme = localStorage.getItem('beetroot-theme');
    setTheme(savedTheme === 'light' ? 'light' : 'dark');

    // RTL Toggle
    const rtlToggle = document.getElementById('rtlToggle');
    function setDir(dir) {
      if(dir === 'rtl') {
        document.documentElement.setAttribute('dir','rtl');
        body.setAttribute('dir','rtl');
        if(rtlToggle) rtlToggle.innerHTML = '<i class="fas fa-exchange-alt"></i> LTR';
      } else {
        document.documentElement.setAttribute('dir','ltr');
        body.setAttribute('dir','ltr');
        if(rtlToggle) rtlToggle.innerHTML = '<i class="fas fa-exchange-alt"></i> RTL';
      }
    }
    if(rtlToggle) {
      rtlToggle.addEventListener('click', () => {
        const cur = document.documentElement.getAttribute('dir') || 'ltr';
        const newDir = cur === 'ltr' ? 'rtl' : 'ltr';
        setDir(newDir);
        localStorage.setItem('beetroot-dir', newDir);
      });
    }
    const savedDir = localStorage.getItem('beetroot-dir');
    if(savedDir) setDir(savedDir); else setDir('ltr');

    // Toggle Password Visibility
    const togglePassword = document.getElementById('togglePassword');
    const password = document.getElementById('password');

    togglePassword.addEventListener('click', function () {
      const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
      password.setAttribute('type', type);
      this.classList.toggle('fa-eye');
      this.classList.toggle('fa-eye-slash');
    });

    // Handle Form Submit
    document.getElementById('registerForm').addEventListener('submit', (e) => {
      e.preventDefault();
      alert('Welcome to the Beetroot Detox community!');
    });
  </script>
</body>
</html>
